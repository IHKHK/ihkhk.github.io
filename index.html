<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PULSE English-Chinese Keyboard</title>
  <meta name="description" content="Official website for PULSE English-Chinese Keyboard.">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f7f8fa;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 60px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      margin-bottom: 20px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 2rem;
    }
    p {
      line-height: 1.6;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .links {
      margin-top: 24px;
    }
    .links a {
      display: inline-block;
      margin: 0 8px 10px;
    }
    .note {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #6b7280;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img
        src="pulse_icon_option_trimmed_1024.png"
        alt="PULSE app icon"
        class="app-icon"
      >

      <h1>PULSE English-Chinese Keyboard</h1>

      <p>
        Welcome to the official website for PULSE English-Chinese Keyboard.
      </p>

      <div class="links">
        <a href="/app-ads.txt">app-ads.txt</a>
      </div>

      <p class="note">
        This site is used to publish the app's <code>app-ads.txt</code> file.
      </p>
    </div>
  </div>
</body>
</html>
